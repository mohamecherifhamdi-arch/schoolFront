                <div class="form-container" >
  <h2>Add New Transaction</h2>
  <form id="transactionForm">
    <div class="form-group">
      <label for="product">Product Name</label>
      <input type="text" id="product" name="product" placeholder="Enter product name" required>
      <div class="error" id="productError"></div>
    </div>

    <div class="form-group">
      <label for="transactionID">Transaction ID</label>
      <input type="text" id="transactionID" name="transactionID" placeholder="e.g., TRX123456" required>
      <div class="error" id="transactionIDError"></div>
    </div>

    <div class="form-group">
      <label for="quantity">Quantity</label>
      <input type="number" id="quantity" name="quantity" min="1" value="1" required>
      <div class="error" id="quantityError"></div>
    </div>

    <div class="form-group">
      <label for="user">User</label>
      <input type="text" id="user" name="user" placeholder="Enter user name" required>
      <div class="error" id="userError"></div>
    </div>

    <div class="form-group">
      <label for="price">Price</label>
      <input type="text" id="price" name="price" placeholder="Enter price" required>
      <div class="error" id="priceError"></div>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status" required>
        <option value="">Select Status</option>
        <option value="shipped">Shipped</option>
        <option value="packing">Packing</option>
        <option value="delivered">Delivered</option>
      </select>
      <div class="error" id="statusError"></div>
    </div>

    <button type="submit">Add Transaction</button>
  </form>
</div>
