<div class="row">
  <!-- En-tete -->
  <div class="col-12 mb-4">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div class="d-flex align-items-center gap-3">
        <div class="header-icon-wrapper rounded-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
        </div>
        <div>
          <h4 class="mb-1 text-dark fw-bold">Absences</h4>
          <p class="text-muted mb-0">Suivez les absences des enseignants</p>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <span class="badge rounded-pill bg-soft-primary text-primary px-3 py-2 fs-7 fw-semibold">
          <i class="ti ti-alert-triangle me-1"></i>{{ listeAbsences.length }} absence{{ listeAbsences.length > 1 ? 's' : '' }}
        </span>
        <button class="btn btn-primary rounded-pill px-3 py-2 fs-7 fw-semibold" (click)="ouvrirAjout()">
          <i class="ti ti-plus me-1"></i> Nouvelle absence
        </button>
      </div>
    </div>
  </div>

  <!-- Message de succes -->
  <div class="col-12 mb-4" *ngIf="messageSucces">
    <div class="alert alert-success alert-dismissible fade show rounded-3 p-3 mb-0" role="alert">
      <div class="d-flex gap-2 align-items-center">
        <i class="ti ti-circle-check fs-4"></i>
        <div>{{ messageSucces }}</div>
        <button type="button" class="btn-close ms-auto" (click)="messageSucces = ''"></button>
      </div>
    </div>
  </div>

  <!-- FullCalendar -->
  <div class="col-12">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-3">
        <full-calendar [options]="calOptions"></full-calendar>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<ng-template #absenceModal let-modal>
  <div class="card border-0 shadow-sm booking-form-card">
    <div class="card-header bg-transparent border-bottom-0 p-0">
      <ul class="nav nav-tabs nav-fill border-bottom" role="tablist">
        <li class="nav-item">
          <button class="nav-link py-3 fw-semibold border-0 active" type="button">
            <i class="ti" [ngClass]="modeEdition ? 'ti-edit' : 'ti-alert-triangle'"></i>
            {{ modeEdition ? "Modifier l'absence" : 'Nouvelle absence' }}
          </button>
        </li>
      </ul>
    </div>

    <div class="card-body p-4">
      <p class="text-muted mb-4 fs-7">{{ modeEdition ? 'Modifiez les informations ci-dessous' : 'Enregistrez une nouvelle absence' }}</p>

      <form (submit)="sauvegarder(); $event.preventDefault()">
        <div class="row g-3 mb-4">
          <div class="col-12 col-md-6">
            <label class="form-label text-dark fw-semibold fs-7"><i class="ti ti-calendar me-1 text-primary"></i>Date</label>
            <input type="date" class="form-control rounded-3 py-2" [(ngModel)]="formulaireDate" name="date" required>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-dark fw-semibold fs-7"><i class="ti ti-school me-1 text-primary"></i>Classe</label>
            <select class="form-select rounded-3 py-2" [(ngModel)]="formulaireClasse" name="classe" required>
              <option value="" disabled selected>Selectionner une classe...</option>
              <option *ngFor="let c of classes" [value]="c.nom">{{ c.nom }}</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-dark fw-semibold fs-7"><i class="ti ti-chalkboard me-1 text-primary"></i>Enseignant</label>
            <select class="form-select rounded-3 py-2" [(ngModel)]="formulaireEnseignant" name="sujet" required [compareWith]="compareEnseignant">
              <option [ngValue]="null" disabled selected>Selectionner un enseignant...</option>
              <option *ngFor="let e of enseignants" [ngValue]="e">{{ e.nom }} {{ e.prenom }}</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-dark fw-semibold fs-7"><i class="ti ti-building me-1 text-primary"></i>Salle</label>
            <select class="form-select rounded-3 py-2" [(ngModel)]="formulaireSalle" name="salle">
              <option value="" disabled selected>Selectionner une salle...</option>
              <option *ngFor="let s of salles" [value]="s.nom">{{ s.nom }}</option>
            </select>
          </div>
          <div class="col-12 col-md-6" *ngIf="modeEdition">
            <label class="form-label text-dark fw-semibold fs-7"><i class="ti ti-flag me-1 text-primary"></i>Justifiee</label>
            <select class="form-select rounded-3 py-2" [(ngModel)]="formulaireCouleur" name="couleur">
              <option value="success">Oui</option>
              <option value="danger">Non</option>
            </select>
          </div>
        </div>
        <div class="d-flex gap-2 justify-content-end pt-3 border-top">
          <button type="button" class="btn btn-outline-secondary rounded-pill px-4 py-2 fs-7 fw-semibold" (click)="modal.dismiss()">Annuler</button>
          <button type="button" class="btn btn-outline-danger rounded-pill px-4 py-2 fs-7 fw-semibold" *ngIf="modeEdition" (click)="supprimer()">
            <i class="ti ti-trash me-1"></i> Supprimer
          </button>
          <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 fs-7 fw-semibold submit-btn shadow-sm" [disabled]="!formulaireClasse || !formulaireEnseignant || !formulaireDate">
            <i class="ti" [ngClass]="modeEdition ? 'ti-device-floppy' : 'ti-plus'"></i>
            {{ modeEdition ? 'Enregistrer' : 'Ajouter' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</ng-template>
