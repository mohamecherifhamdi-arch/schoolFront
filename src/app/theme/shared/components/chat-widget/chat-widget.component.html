<div class="chat-widget">
  <button class="chat-toggle" (click)="toggle()" [class.active]="open">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <div class="chat-panel" *ngIf="open">
    <div class="chat-header">
      <span>Assistant</span>
      <button (click)="toggle()">&times;</button>
    </div>
    <div class="chat-messages" #messageContainer>
      <div *ngFor="let msg of messages" class="message" [class.user]="msg.fromUser" [class.bot]="!msg.fromUser">
        <div class="bubble">{{ msg.text }}</div>
      </div>
      <div *ngIf="loading" class="message bot">
        <div class="bubble typing">...</div>
      </div>
    </div>
    <div class="chat-input">
      <input
        type="text"
        [(ngModel)]="input"
        (keydown.enter)="send()"
        placeholder="Écrivez votre message..."
        [disabled]="loading"
      />
      <button (click)="send()" [disabled]="!input.trim() || loading">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>
