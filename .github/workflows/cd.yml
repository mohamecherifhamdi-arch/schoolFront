name: CD - Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image in Minikube's Docker daemon
        run: |
          eval $(minikube docker-env)
          docker build -t frontend:${{ steps.vars.outputs.TAG }} .

      - name: Checkout k8s-manifests repo
        uses: actions/checkout@v4
        with:
          repository: mohamecherifhamdi-arch/k8s-manifests
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          path: k8s-manifests

      - name: Update image tag in manifest
        run: |
          cd k8s-manifests
          sed -i "s|image: frontend:.*|image: frontend:${{ steps.vars.outputs.TAG }}|" frontend.yaml
          cat frontend.yaml | grep image

      - name: Commit and push manifest change
        run: |
          cd k8s-manifests
          git config user.name "github-actions-bot"
          git config user.email "actions@github.com"
          git add frontend.yaml
          git commit -m "deploy: update frontend to ${{ steps.vars.outputs.TAG }}" || echo "No changes to commit"
          git push
